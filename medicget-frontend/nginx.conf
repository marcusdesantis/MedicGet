# =============================================================================
# nginx.conf — sirve la SPA Vite/React desde /usr/share/nginx/html
#
# Decisiones clave:
#   • try_files redirige cualquier ruta no-archivo a /index.html, que es
#     lo que React Router necesita para que recargar /patient/appointments
#     no devuelva 404.
#   • Cache largo para los assets con hash en el nombre (Vite los emite
#     con fingerprint, así que cambiarlos = nuevo filename).
#   • index.html con cache `no-store` para que cada deploy se vea al instante.
#   • Gzip básico para reducir el peso del bundle.
# =============================================================================

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ─── Compresión ──────────────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript
                       image/svg+xml application/wasm;

    # ─── Assets con hash → cache agresivo ────────────────────────────────────
    # Vite emite /assets/<name>-<hash>.{js,css,svg,png,…}. Cambiarlos genera
    # un filename nuevo, así que se pueden cachear "para siempre".
    location ~* ^/assets/.+\.(?:js|mjs|css|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ─── Service worker → NUNCA cachear ──────────────────────────────────────
    # /sw.js maneja Web Push y otros side-effects; si lo cacheamos el cliente
    # nunca recibe el nuevo.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files  $uri =404;
    }

    # ─── SPA fallback ────────────────────────────────────────────────────────
    # Cualquier path que no matchee un archivo real cae en index.html para
    # que React Router pinte la ruta.
    location / {
        # `no-store` en el HTML para que un deploy nuevo se sirva al instante;
        # los assets ya están protegidos por su propio hash.
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
