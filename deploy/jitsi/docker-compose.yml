# =============================================================================
# Jitsi Meet self-hosted para MedicGet — stack independiente.
#
# Por qué separado del docker-compose.yml principal:
#   • Ciclo de vida distinto (no se rebuildea con cada deploy de la app).
#   • Aislamiento de recursos (Jitsi/JVB consume RAM/CPU; si se cae no
#     arrastra los microservicios).
#   • Jitsi tiene su propio dominio (meet.medicget.io) y su puerto de
#     media UDP 10000.
#
# Resultado: un Jitsi SIN autenticación (ENABLE_AUTH=0) — cualquiera con
# el link inicia y entra. Eso resuelve el problema de tener que loguearse
# como moderador en meet.jit.si.
#
# El `web` container sirve la app por HTTP en 127.0.0.1:8000; el nginx
# HOST (meet.medicget.io :443) termina TLS y proxia hacia ahí.
#
# Uso (desde deploy/jitsi/, ver deploy/JITSI_SELFHOSTED.md):
#   cp jitsi.env.example .env
#   ./gen-passwords.sh          # genera los secrets de componentes
#   docker compose up -d
# =============================================================================

services:
  # ── Frontend web (sirve la SPA de Jitsi Meet) ──────────────────────────────
  web:
    image: jitsi/web:stable
    container_name: jitsi-web
    restart: unless-stopped
    ports:
      # Solo localhost — el nginx HOST con TLS es el único punto de entrada
      # al WAN (igual que el gateway interno de la app).
      - "127.0.0.1:8000:80"
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/web/crontabs:/var/spool/cron/crontabs:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
    environment:
      - ENABLE_LETSENCRYPT=0          # TLS lo maneja el nginx HOST, no Jitsi
      - DISABLE_HTTPS=1               # el web container sirve HTTP interno
      - PUBLIC_URL
      - TZ
      - ENABLE_AUTH=0                 # ← SIN autenticación: nadie se registra
      - ENABLE_GUESTS=1
      - ENABLE_XMPP_WEBSOCKET=1
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_BOSH_URL_BASE
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - JICOFO_AUTH_USER
      - JVB_PREFER_SCTP
    networks:
      meet.jitsi:

  # ── Prosody (servidor XMPP — señalización) ─────────────────────────────────
  prosody:
    image: jitsi/prosody:stable
    container_name: jitsi-prosody
    restart: unless-stopped
    expose:
      - "5222"
      - "5347"
      - "5280"
    volumes:
      - ${CONFIG}/prosody/config:/config:Z
      - ${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
    environment:
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - GLOBAL_MODULES
      - GLOBAL_CONFIG
      - LDAP_URL
      - AUTH_TYPE
      - TZ
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MODULES
      - XMPP_MUC_MODULES
      - XMPP_INTERNAL_MUC_MODULES
      - JICOFO_COMPONENT_SECRET
      - JICOFO_AUTH_USER
      - JICOFO_AUTH_PASSWORD
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JIGASI_XMPP_USER
      - JIGASI_XMPP_PASSWORD
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
    networks:
      meet.jitsi:
        aliases:
          - ${XMPP_SERVER:-xmpp.meet.jitsi}

  # ── Jicofo (conference focus — orquesta las salas) ─────────────────────────
  jicofo:
    image: jitsi/jicofo:stable
    container_name: jitsi-jicofo
    restart: unless-stopped
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - ENABLE_AUTH=0
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_SERVER
      - JICOFO_COMPONENT_SECRET
      - JICOFO_AUTH_USER
      - JICOFO_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - TZ
    depends_on:
      - prosody
    networks:
      meet.jitsi:

  # ── JVB (Videobridge — transporta el media de las videollamadas) ───────────
  jvb:
    image: jitsi/jvb:stable
    container_name: jitsi-jvb
    restart: unless-stopped
    ports:
      # Puerto de media. DEBE estar abierto en el firewall (UDP 10000) y
      # alcanzable desde internet, sino el video/audio no fluye.
      - "10000:10000/udp"
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - DOCKER_HOST_ADDRESS
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_SERVER
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - JVB_PORT=10000
      - JVB_ADVERTISE_IPS
      - JICOFO_AUTH_USER
      - TZ
    depends_on:
      - prosody
    networks:
      meet.jitsi:

networks:
  meet.jitsi:
    driver: bridge
