# =============================================================================
# Nginx HOST reverse proxy para MedicGet.
#
# Este Nginx vive directamente en el VPS (NO dentro de docker) y termina TLS.
# Reenvía:
#   - https://medicget.io          → http://127.0.0.1:8080  (nginx interno del docker)
#   - https://www.medicget.io      → redirect 301 a https://medicget.io
#   - https://ci.medicget.io       → http://127.0.0.1:9090  (Jenkins)
#
# Ubicación en el VPS: /etc/nginx/sites-available/medicget.conf
# Activar con:
#   sudo ln -s /etc/nginx/sites-available/medicget.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certificados Let's Encrypt los genera certbot y los renueva solo.
# =============================================================================

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name medicget.io www.medicget.io ci.medicget.io;

  # Necesario para que certbot pueda hacer el ACME challenge en HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Todo el resto va a HTTPS.
  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── medicget.io (app principal) ──────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name medicget.io;

  ssl_certificate     /etc/letsencrypt/live/medicget.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/medicget.io/privkey.pem;

  # SSL hardening — config recomendada por Mozilla (intermediate, 2024).
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;
  ssl_stapling on;
  ssl_stapling_verify on;

  # Security headers básicos.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Tamaño máximo de upload — para avatares y futuros docs médicos.
  client_max_body_size 25M;

  # Proxy al nginx interno del docker-compose (escucha en 127.0.0.1:8080).
  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    # Headers que el backend necesita para saber el cliente real.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSockets (por si en el futuro agregan notifs en vivo o chat).
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;
  }
}

# ─── www.medicget.io → medicget.io ───────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.medicget.io;

  ssl_certificate     /etc/letsencrypt/live/medicget.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/medicget.io/privkey.pem;

  return 301 https://medicget.io$request_uri;
}

# ─── ci.medicget.io (Jenkins) ────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ci.medicget.io;

  ssl_certificate     /etc/letsencrypt/live/ci.medicget.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ci.medicget.io/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # Jenkins necesita más espacio para uploads de plugins.
  client_max_body_size 100M;

  location / {
    proxy_pass http://127.0.0.1:9090;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Jenkins long-polling y CLI necesitan estos timeouts altos.
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout       60s;
    proxy_read_timeout          900s;
    proxy_send_timeout          900s;
    proxy_buffering             off;
    proxy_request_buffering     off;
  }
}

# Mapping para WebSocket upgrade headers (necesario por los `proxy_set_header
# Connection $connection_upgrade` de arriba). Va en nginx.conf principal o
# acá; ponerlo acá no rompe si ya está en el global.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}
