# =============================================================================
# cors.conf — CORS handling shared across every API location.
#
# Mounted into the nginx container at /etc/nginx/cors.conf (see docker-compose).
# Each `location /api/v1/...` includes this file BEFORE its `proxy_pass`.
#
# The allowlist lives in nginx.conf as a `map $http_origin $cors_origin`. If
# the browser's Origin matches an allowed value, $cors_origin echoes it back;
# otherwise it's empty and no Access-Control-Allow-Origin header is emitted
# (so the browser will block the response — exactly the behavior we want for
# untrusted origins). Extending it is one line in nginx.conf.
#
# Auth uses Bearer tokens (Authorization header), NOT cookies, so we do NOT
# emit `Access-Control-Allow-Credentials: true` and we do NOT need to avoid
# the `*` wildcard. Adding `credentials: 'include'` later would require
# adding that header AND keeping the explicit-origin echo (no `*`).
# =============================================================================

# ── Preflight (OPTIONS) — answered at the gateway, never hits Node.js ────────
if ($request_method = OPTIONS) {
    add_header Access-Control-Allow-Origin  $cors_origin                              always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"  always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept"     always;
    add_header Access-Control-Max-Age       86400                                     always;
    add_header Content-Length               0                                         always;
    add_header Content-Type                 "text/plain; charset=utf-8"               always;
    return 204;
}

# ── Actual responses (GET/POST/PATCH/DELETE) ─────────────────────────────────
# `always` ensures the header is set even on 4xx/5xx — important so the
# browser surfaces real API error bodies instead of a generic CORS failure.
add_header Access-Control-Allow-Origin   $cors_origin                     always;
add_header Access-Control-Expose-Headers "Content-Length, Content-Type"   always;
