worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile        on;
  keepalive_timeout 65;

  # ── Upstream definitions ────────────────────────────────────────────────────
  upstream svc_auth        { server svc-auth:4001; }
  upstream svc_users       { server svc-users:4002; }
  upstream svc_clinic      { server svc-clinic:4003; }
  upstream svc_doctor      { server svc-doctor:4004; }
  upstream svc_patient     { server svc-patient:4005; }
  upstream svc_appointment { server svc-appointment:4006; }
  upstream svc_dashboard   { server svc-dashboard:4007; }
  upstream svc_admin       { server svc-admin:4008; }

  # ── CORS allowlist ──────────────────────────────────────────────────────────
  # Echo the browser's Origin back ONLY if it's allowed. Unknown origins get
  # empty string, which means no Access-Control-Allow-Origin header is sent
  # and the browser blocks the response (correct behaviour for untrusted UIs).
  #
  # To allow another origin (e.g. a production frontend), add one line below:
  #   "https://app.medicget.com"  $http_origin;
  map $http_origin $cors_origin {
    default                       "";
    "http://localhost:3000"       $http_origin;
    "http://localhost:5173"       $http_origin;
  }

  # Shared proxy headers snippet (repeated per block — nginx has no variables in headers)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen      80;
    server_name _;

    # Subir el tamaño máximo del body — necesario para que pasen:
    #   • Avatares en base64 (~50 KB)
    #   • Logos de clínica (~50 KB)
    #   • Adjuntos de chat: imágenes hasta 5 MB y PDFs hasta 5 MB,
    #     que en base64 suben hasta ~6.7 MB
    # Default nginx es 1 MB → cualquier upload mediano daba 413.
    client_max_body_size 10M;

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # ── Auth service  (/api/v1/auth/*) ────────────────────────────────────────
    # Prefix without trailing slash so requests like `/api/v1/auth/login` AND
    # `/api/v1/auth` both match this block. Otherwise axios calls without a
    # trailing slash (e.g. `apiGet('/auth')`) miss every location, fall to
    # nginx's default 404 — which has NO CORS headers — and the browser
    # blames CORS instead of the real "no route" cause.
    location /api/v1/auth {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_auth;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Users service  (/api/v1/users/*) ─────────────────────────────────────
    location /api/v1/users {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_users;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Notifications (/api/v1/notifications/*) → svc-users ────────────
    location /api/v1/notifications {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_users;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Web Push (/api/v1/push/*) → svc-users ──────────────────────────
    location /api/v1/push {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_users;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Clinic service  (/api/v1/clinics/*) ──────────────────────────────────
    location /api/v1/clinics {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_clinic;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Doctor service  (/api/v1/doctors/*) ──────────────────────────────────
    location /api/v1/doctors {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_doctor;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Patient service  (/api/v1/patients/*) ────────────────────────────────
    location /api/v1/patients {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_patient;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Appointment service  (/api/v1/appointments/*) ────────────────────────
    location /api/v1/appointments {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_appointment;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Payments listing + receipts  (/api/v1/payments/*) ────────────────────
    # Mismo servicio que appointments porque la tabla `Payment` vive ahí.
    location /api/v1/payments {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_appointment;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dashboard service  (/api/v1/dashboard/*) ─────────────────────────────
    location /api/v1/dashboard {
      include /etc/nginx/cors.conf;

      proxy_pass         http://svc_dashboard;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Admin service  (/api/v1/admin/*, /plans, /subscriptions, /app-settings)
    location /api/v1/admin {
      include /etc/nginx/cors.conf;
      proxy_pass         http://svc_admin;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/v1/plans {
      include /etc/nginx/cors.conf;
      proxy_pass         http://svc_admin;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/v1/subscriptions {
      include /etc/nginx/cors.conf;
      proxy_pass         http://svc_admin;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/v1/app-settings {
      include /etc/nginx/cors.conf;
      proxy_pass         http://svc_admin;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
