services:
  # ── Database ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medicget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: "1998jh"
      POSTGRES_DB:       medicget_dev
    ports:
      # Host:Container — published on 5433 to avoid colliding with a native
      # Postgres install on 5432 (e.g. PostgreSQL 17 on Windows). Inside the
      # docker-compose network the services keep using `postgres:5432`.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medicget-net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d medicget_dev"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── svc-auth  (4001) ──────────────────────────────────────────────────────────
  svc-auth:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-auth
        PORT:         "4001"
    container_name: medicget-svc-auth
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4001"
      # svc-auth manda emails (verify-email, resend-verification,
      # forgot-password) por sí mismo, así que necesita la config SMTP
      # como fallback cuando AppSettings de la DB todavía no se sembró
      # (primer arranque, antes de que el superadmin entre a /admin).
      # Si el superadmin edita estos valores en /admin/settings, la DB
      # gana sobre las env vars (ver shared/settings.ts).
      SMTP_HOST:    smtps.aruba.it
      SMTP_PORT:    "465"
      SMTP_SECURE:  "false"
      SMTP_USER:    soportemedicget@abisoft.it
      SMTP_PASS:    Ecuador7.
      SMTP_FROM:    MedicGet <soportemedicget@abisoft.it>
      # URL del frontend para construir los links en los emails (botón
      # "Verificar mi cuenta", "Restablecer contraseña").
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    expose:
      - "4001"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-users  (4002) ─────────────────────────────────────────────────────────
  svc-users:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-users
        PORT:         "4002"
    container_name: medicget-svc-users
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4002"
    expose:
      - "4002"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-clinic  (4003) ────────────────────────────────────────────────────────
  svc-clinic:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-clinic
        PORT:         "4003"
    container_name: medicget-svc-clinic
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4003"
    expose:
      - "4003"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-doctor  (4004) ────────────────────────────────────────────────────────
  svc-doctor:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-doctor
        PORT:         "4004"
    container_name: medicget-svc-doctor
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4004"
    expose:
      - "4004"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-patient  (4005) ───────────────────────────────────────────────────────
  svc-patient:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-patient
        PORT:         "4005"
    container_name: medicget-svc-patient
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4005"
    expose:
      - "4005"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-appointment  (4006) ───────────────────────────────────────────────────
  svc-appointment:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-appointment
        PORT:         "4006"
    container_name: medicget-svc-appointment
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4006"
      # ─── Email (nodemailer) ────────────────────────────────────────────
      # If SMTP_HOST is empty the email service falls back to logging to
      # stdout — useful for local dev without setting up a real inbox.
      # Estos valores actúan como fallback si AppSettings (DB) no tiene
      # los campos seteados. El superadmin puede editarlos en runtime
      # desde /admin/settings sin tocar el compose.
      #
      # Default: cuenta corporativa Abisoft via Aruba SMTP (smtps.aruba.it:465).
      # Otros proveedores comunes:
      #   • Gmail (app password): smtp.gmail.com / 587 / secure=false
      #   • Mailtrap (testing):   smtp.mailtrap.io / 587 / secure=false
      #   • SendGrid / Mailgun / SES: su endpoint SMTP
      SMTP_HOST: smtps.aruba.it
      SMTP_PORT: 465
      SMTP_SECURE: "false"
      SMTP_USER: soportemedicget@abisoft.it
      SMTP_PASS: Ecuador7.
      SMTP_FROM: MedicGet <soportemedicget@abisoft.it>
      # ─── Videollamada ──────────────────────────────────────────────────
      # Self-hosted Jitsi? Apuntá aquí. Vacío usa el servidor público gratis.
      JITSI_BASE_URL: ${JITSI_BASE_URL:-https://meet.jit.si}
      # ─── Pasarela de pagos (PayPhone) ──────────────────────────────────
      # Si PAYPHONE_TOKEN está vacío, el módulo entra en modo STUB:
      # simula prepareSale y confirmSale sin contactar al servidor real,
      # útil para desarrollo end-to-end sin credenciales comerciales.
      #
      # Producción: pedile a PayPhone tu token Bearer y storeId numérico
      # desde su panel comercial (https://www.payphone.com).
      PAYPHONE_TOKEN:    ${PAYPHONE_TOKEN:-}
      PAYPHONE_STORE_ID: ${PAYPHONE_STORE_ID:-}
      PAYPHONE_BASE_URL: ${PAYPHONE_BASE_URL:-https://pay.payphonetodoesposible.com/api}
      # Comisión de la plataforma como %. Default 10%. Se descuenta al
      # confirmar el pago — `Payment.platformFee` y `Payment.doctorAmount`
      # quedan persistidos para reportería.
      PLATFORM_FEE_PCT:  ${PLATFORM_FEE_PCT:-10}
    expose:
      - "4006"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-dashboard  (4007) ─────────────────────────────────────────────────────
  svc-dashboard:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-dashboard
        PORT:         "4007"
    container_name: medicget-svc-dashboard
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4007"
    expose:
      - "4007"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── svc-admin  (4008) ─────────────────────────────────────────────────────────
  # Hosts the superadmin endpoints, public /plans, and the /subscriptions
  # endpoints (own subscription + checkout/confirm). Reads SMTP/PayPhone/Jitsi
  # from AppSettings (DB) which the admin panel can edit at runtime — env
  # vars below are bootstrap fallbacks only.
  svc-admin:
    build:
      context:    .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: svc-admin
        PORT:         "4008"
    container_name: medicget-svc-admin
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://postgres:1998jh@postgres:5432/medicget_dev?schema=public
      JWT_SECRET:     change-me-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV:       production
      PORT:           "4008"
    expose:
      - "4008"
    networks:
      - medicget-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx reverse proxy  (8080 → services) ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: medicget-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cors.conf:/etc/nginx/cors.conf:ro
    networks:
      - medicget-net
    depends_on:
      - svc-auth
      - svc-users
      - svc-clinic
      - svc-doctor
      - svc-patient
      - svc-appointment
      - svc-dashboard
      - svc-admin

networks:
  medicget-net:
    driver: bridge

volumes:
  postgres_data:
